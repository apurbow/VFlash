<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">

	<defs>

		<!-- Background -->
		<radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
			gradientTransform="translate(210 160) rotate(45) scale(1100)">
			<stop offset="0%" stop-color="#4ED2FF" />
			<stop offset="45%" stop-color="#4D63FF" />
			<stop offset="78%" stop-color="#7A3FFF" />
			<stop offset="100%" stop-color="#FF52D9" />
		</radialGradient>

		<!-- Main Card -->
		<linearGradient id="cardGrad" x1="280" y1="160" x2="760" y2="850">
			<stop offset="0%" stop-color="#FFFFFF" />
			<stop offset="100%" stop-color="#ECE9FF" />
		</linearGradient>

		<!-- Rear Card -->
		<linearGradient id="rearCardGrad" x1="600" y1="280" x2="920" y2="860">
			<stop offset="0%" stop-color="#FFFFFF" />
			<stop offset="100%" stop-color="#D8B7FF" />
		</linearGradient>

		<!-- Bolt -->
		<linearGradient id="boltGrad" x1="450" y1="260" x2="650" y2="760">
			<stop offset="0%" stop-color="#00C8FF" />
			<stop offset="50%" stop-color="#4B5FFF" />
			<stop offset="100%" stop-color="#9A2EFF" />
		</linearGradient>

		<!-- Shadows -->
		<filter id="cardShadow" x="-20%" y="-20%" width="160%" height="160%">
			<feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#000000" flood-opacity="0.25" />
		</filter>

		<filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
			<feGaussianBlur stdDeviation="16" result="blur" />
			<feMerge>
				<feMergeNode in="blur" />
				<feMergeNode in="SourceGraphic" />
			</feMerge>
		</filter>

	</defs>

	<!-- Background -->
	<rect width="1024" height="1024" rx="210" fill="url(#bgGlow)" />

	<!-- Rear translucent card -->
	<g opacity="0.45">
		<rect x="500" y="235" width="370" height="560" rx="58" transform="rotate(10 575 265)" fill="url(#rearCardGrad)"
			stroke="rgba(255,255,255,0.4)" stroke-width="4" />
	</g>

	<!-- Main white card -->
	<g filter="url(#cardShadow)">
		<rect x="200" y="190" width="520" height="620" rx="78" transform="rotate(-7 300 190)" fill="url(#cardGrad)" />
	</g>

	<!-- Lightning Bolt -->
	<path d="m504.7933 452.4839 88.6327-15.6283L458.7044 709.3902l14.5108-205.644-98.4808 17.3649 140.6899-284.7566z"
		fill="url(#boltGrad)" filter="url(#softGlow)" />

	<!-- Top left shine marks -->
	<rect x="90" y="275" width="86" height="24" rx="12" transform="rotate(3 175 315)" fill="white" opacity="0.95" />

	<rect x="110" y="230" width="78" height="24" rx="12" transform="rotate(34 235 230)" fill="white" opacity="0.95" />

	<rect x="220" y="240" width="78" height="24" rx="12" transform="rotate(70 330 170)" fill="white" opacity="0.95" />

</svg>